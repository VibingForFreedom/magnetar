version: "2"

run:
  build-tags:
    - sqlite_fts5

linters:
  enable:
    # Bugs & correctness
    - govet          # Go vet checks (shadow, printf, etc.)
    - staticcheck    # Comprehensive static analysis (SA*, S*, ST*, QF*)
    - errcheck       # Unchecked errors
    - ineffassign    # Detects useless assignments
    - bodyclose      # HTTP response body not closed (connection leak)
    - durationcheck  # Multiplying two durations
    - nilerr         # Returning nil after checking err != nil
    - sqlclosecheck  # SQL rows/stmt not closed (connection leak)
    - makezero       # Slices with make([]T, n) then append (off-by-n bugs)
    - errorlint      # Proper error wrapping/comparison (errors.Is/As)

    # Memory & performance
    - prealloc       # Slice pre-allocation opportunities in loops
    - gocritic       # With performance tag: stringXbytes, indexAlloc, appendAssign
    - perfsprint     # fmt.Sprintf replaceable with zero-alloc alternatives
    - unconvert      # Unnecessary type conversions that may allocate
    - intrange       # for i := 0; i < len(s); i++ -> for i := range s (Go 1.22+)

    # Code quality
    - unused         # Unused code
    - unparam        # Unused function parameters
    - misspell       # Spelling mistakes in comments/strings
    - copyloopvar    # Loop variable copy issues (Go 1.22+)
    - goconst        # Repeated string literals that should be constants

    # Security
    - gosec          # Security issues (SQL injection, hardcoded creds, etc.)
    - noctx          # HTTP requests without context (goroutine/connection leak)

linters-settings:
  govet:
    enable-all: true
    disable:
      - fieldalignment  # Too noisy — use betteralign for targeted struct optimization
  gocritic:
    enabled-tags:
      - diagnostic
      - performance
    disabled-checks:
      - hugeParam       # Too strict for value receivers on small structs
      - rangeValCopy    # Often intentional
  gosec:
    excludes:
      - G104  # Unhandled errors (covered by errcheck)
      - G304  # File path from variable (we need this for DB paths)
  staticcheck:
    checks:
      - all
      - -SA1029  # Using context.WithValue with string key is fine for simple cases
  errcheck:
    exclude-functions:
      - (io.Closer).Close
      - (*database/sql.Rows).Close
      - (net.Conn).Close
  perfsprint:
    int-conversion: true
    err-error: true
    errorf: true
    sprintf1: true
  prealloc:
    simple: true
    range-loops: true
    for-loops: true

issues:
  exclude-dirs:
    - third_party
    - frontend
  max-issues-per-linter: 0
  max-same-issues: 0
  exclude-rules:
    # Test files: allow fmt.Sprintf freely
    - path: "_test\\.go"
      linters:
        - perfsprint
        - goconst
